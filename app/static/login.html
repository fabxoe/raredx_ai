<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RARE_DX_AI Login</title>
  <link rel="stylesheet" href="/static/styles.css?v=login-v1">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="brand-block login-brand">
        <div class="brand-mark" aria-hidden="true">RX</div>
        <div>
          <h1>RARE_DX_AI</h1>
          <p>Rare disease candidate prioritization</p>
        </div>
      </div>

      <div class="login-copy">
        <span class="eyebrow">Team access</span>
        <h2 id="login-title">로그인이 필요합니다</h2>
        <p>
          RARE_DX_AI는 팀 연구용 프로토타입입니다. 허용된 팀원 이메일로 Cloudflare Access 인증을 완료하면
          후보 질환 우선순위 화면으로 이동합니다.
        </p>
      </div>

      <a class="login-action" href="/">
        Continue with Cloudflare Access
      </a>

      <p class="login-note">
        이미 인증된 상태라면 메인 화면이 바로 열립니다. 접근 권한이 없으면 팀 관리자에게 이메일 등록을 요청하세요.
      </p>
    </section>
  </main>
</body>
</html>
