<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="cache-control" content="no-store">
  <title>RARE_DX_AI Logout</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png?v=mark-v1">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png?v=mark-v1">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=mark-v1">
  <link rel="stylesheet" href="/static/styles.css?v=auth-v3">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel logout-panel" aria-labelledby="logout-title">
      <div class="brand-block login-brand">
        <img
          class="auth-logo"
          src="/assets/raredx-logo-cloudflare.png"
          alt="RareDxAI"
        >
        <span class="auth-domain">cromtind.uk</span>
      </div>

      <div class="login-copy">
        <span class="eyebrow">Team access</span>
        <h2 id="logout-title">로그아웃 중입니다</h2>
        <p id="logout-message">
          Cloudflare Access 세션을 종료하고 있습니다. 약 <strong id="logout-countdown">32</strong>초 후
          로그인 화면으로 이동합니다.
        </p>
      </div>

      <div class="logout-spinner" aria-hidden="true"></div>

      <a class="login-action logout-fallback" href="/" hidden>
        로그인 화면으로 이동
      </a>
    </section>
  </main>

  <script>
    const fallback = document.querySelector(".logout-fallback");
    const countdown = document.querySelector("#logout-countdown");
    const message = document.querySelector("#logout-message");
    const redirectDelayMs = 32000;
    let remainingSeconds = Math.ceil(redirectDelayMs / 1000);

    const countdownTimer = setInterval(() => {
      remainingSeconds -= 1;
      if (countdown) {
        countdown.textContent = String(Math.max(remainingSeconds, 0));
      }
      if (remainingSeconds <= 0) {
        clearInterval(countdownTimer);
      }
    }, 1000);

    async function logout() {
      try {
        await fetch("/cdn-cgi/access/logout", {
          cache: "no-store",
          credentials: "include",
          redirect: "manual",
        });
      } catch {
        message.textContent = "세션 종료 요청을 보냈습니다. 로그인 화면으로 이동합니다.";
      } finally {
        setTimeout(() => {
          window.location.replace("/");
        }, redirectDelayMs);
        setTimeout(() => {
          fallback.hidden = false;
        }, 8000);
      }
    }

    logout();
  </script>
</body>
</html>
