<svg xmlns="http://www.w3.org/2000/svg" width="520" height="110" viewBox="0 0 520 110" role="img" aria-labelledby="title desc">
  <title id="title">RareDxAI</title>
  <desc id="desc">Compact RareDxAI wordmark for sign-in pages.</desc>
  <defs>
    <linearGradient id="aiGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#79D5A5"/>
      <stop offset="100%" stop-color="#13C6D2"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#153C7B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="520" height="110" fill="none"/>

  <g opacity="0.82">
    <circle cx="30" cy="56" r="5.5" fill="#1F86E5"/>
    <circle cx="58" cy="36" r="5.5" fill="#2D91E8"/>
    <circle cx="84" cy="58" r="6" fill="#2888E1"/>
    <circle cx="112" cy="42" r="5.5" fill="#67C2F2"/>
    <line x1="30" y1="56" x2="58" y2="36" stroke="#8EC8F5" stroke-width="2.5"/>
    <line x1="58" y1="36" x2="84" y2="58" stroke="#8EC8F5" stroke-width="2.5"/>
    <line x1="84" y1="58" x2="112" y2="42" stroke="#8EC8F5" stroke-width="2.5"/>
    <line x1="30" y1="56" x2="84" y2="58" stroke="#8EC8F5" stroke-width="2.5"/>
  </g>

  <g filter="url(#softShadow)">
    <text x="140" y="75"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="64"
          font-weight="850"
          letter-spacing="-0.5"
          fill="#082779">RareDx</text>
    <text x="404" y="75"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="64"
          font-weight="850"
          letter-spacing="-0.5"
          fill="url(#aiGradient)">AI</text>
  </g>
</svg>
