name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Secret hygiene check
        run: |
          set -euo pipefail

          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env must not be tracked by Git"
            exit 1
          fi

          if git grep -n -E 'OPENAI_API_KEY=(sk-|sk-proj-)|sk-proj-[A-Za-z0-9_*\-]{8,}|sk-[A-Za-z0-9_*\-]{20,}' -- ':!uv.lock' ':!.github/workflows/ci.yml' ':!.github/workflows/deploy-spare-mac.yml'; then
            echo "::error::Potential API key pattern found in tracked files"
            exit 1
          fi
